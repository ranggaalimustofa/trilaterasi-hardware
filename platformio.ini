; PlatformIO Project Configuration File

[platformio]
default_envs = anchor_1, anchor_2, anchor_3, tag_1

; ─── Base: konfigurasi bersama ───────────────────────────────────────────────
[env:base]
platform      = espressif32
framework     = arduino
monitor_speed = 115200
lib_deps =
    sandeepmistry/LoRa @ ^0.8.0
    bblanchon/ArduinoJson @ ^6.21.0
    tzapu/WiFiManager @ ^2.0.17

; ─── Anchor 1 — koordinat (0.0, 0.0) ────────────────────────────────────────
[env:anchor_1]
extends     = env:base
board       = az-delivery-devkit-v4
build_src_filter = +<anchor/*> -<tag/*>
build_flags =
    -D ANCHOR_ID=1
    -D ANCHOR_X=0.0
    -D ANCHOR_Y=0.0

; ─── Anchor 2 — koordinat (5.0, 0.0) ────────────────────────────────────────
[env:anchor_2]
extends     = env:base
board       = az-delivery-devkit-v4
build_src_filter = +<anchor/*> -<tag/*>
build_flags =
    -D ANCHOR_ID=2
    -D ANCHOR_X=5.0
    -D ANCHOR_Y=0.0

; ─── Anchor 3 — koordinat (2.5, 5.0) ────────────────────────────────────────
[env:anchor_3]
extends     = env:base
board       = az-delivery-devkit-v4
build_src_filter = +<anchor/*> -<tag/*>
build_flags =
    -D ANCHOR_ID=3
    -D ANCHOR_X=2.5
    -D ANCHOR_Y=5.0

; ─── Tag 1 ───────────────────────────────────────────────────────────────────
[env:tag_1]
extends     = env:base
board       = esp32doit-devkit-v1
build_src_filter = +<tag/*> -<anchor/*>
build_flags =
    -D TAG_ID=1
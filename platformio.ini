; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

; PlatformIO Project Configuration File
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = anchor_1, anchor_2, anchor_3, tag_1

; ─── Base: konfigurasi bersama ───────────────────────────────────────────────
[env:base]
platform      = espressif32
framework     = arduino
monitor_speed = 115200
lib_deps =
    sandeepmistry/LoRa @ ^0.8.0
    bblanchon/ArduinoJson @ ^6.21.0

; ─── Anchor 1 — koordinat (0.0, 0.0) ────────────────────────────────────────
[env:anchor_1]
extends     = env:base
board       = az-delivery-devkit-v4
build_src_filter = +<anchor/*> -<tag/*>
build_flags =
    -D ANCHOR_ID=1
    -D ANCHOR_X=0.0f
    -D ANCHOR_Y=0.0f

; ─── Anchor 2 — koordinat (5.0, 0.0) ────────────────────────────────────────
[env:anchor_2]
extends     = env:base
board       = az-delivery-devkit-v4
build_src_filter = +<anchor/*> -<tag/*>
build_flags =
    -D ANCHOR_ID=2
    -D ANCHOR_X=5.0f
    -D ANCHOR_Y=0.0f

; ─── Anchor 3 — koordinat (2.5, 5.0) ────────────────────────────────────────
[env:anchor_3]
extends     = env:base
board       = az-delivery-devkit-v4
build_src_filter = +<anchor/*> -<tag/*>
build_flags =
    -D ANCHOR_ID=3
    -D ANCHOR_X=2.5f
    -D ANCHOR_Y=5.0f

; ─── Tag 1 ───────────────────────────────────────────────────────────────────
[env:tag_1]
extends     = env:base
board       = esp32doit-devkit-v1
build_src_filter = +<tag/*> -<anchor/*>
build_flags =
    -D TAG_ID=1
